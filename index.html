<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklists</title>
<style>
  :root {
    --green-light: #BAC095;
    --green-dark:  #3D4127;
    --black:       #000000;
    --white:       #FFFFFF;
    --bg:          #F5F6F0;
    --border:      #d0d4bb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }

  header { background: var(--green-dark); color: var(--white); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .sync-status { font-size: 0.72rem; letter-spacing: 0.04em; opacity: 0.8; }
  .sync-status.ok { color: var(--green-light); }
  .sync-status.err { color: #f87; }
  .sync-status.saving { color: #ffd; }

  .app { display: grid; grid-template-columns: 270px 1fr; min-height: calc(100vh - 56px); }

  .sidebar { background: var(--white); border-right: 2px solid var(--green-dark); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-tabs { display: flex; border-bottom: 2px solid var(--green-dark); }
  .tab-btn { flex: 1; padding: 11px 8px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: none; border: none; cursor: pointer; color: #999; transition: background 0.12s, color 0.12s; }
  .tab-btn.active { background: var(--green-dark); color: var(--white); }
  .tab-btn:not(.active):hover { background: var(--bg); color: var(--green-dark); }
  .sidebar-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section.hidden { display: none; }
  .list-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }

  .checklist-item { display: flex; align-items: center; padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.12s; gap: 7px; }
  .checklist-item:hover { background: var(--bg); }
  .checklist-item.active { border-left-color: var(--green-dark); background: #eef0e6; }
  .checklist-item .ci-icon { font-size: 0.85rem; flex-shrink: 0; opacity: 0.6; }
  .checklist-item .ci-name { font-size: 0.88rem; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .checklist-item .ci-prog { font-size: 0.68rem; color: #888; white-space: nowrap; }
  .ci-del { background: none; border: none; cursor: pointer; color: #bbb; font-size: 1rem; padding: 0 1px; flex-shrink: 0; }
  .ci-del:hover { color: #c00; }
  .sidebar-empty { padding: 16px 20px; font-size: 0.78rem; color: #bbb; }

  .tpl-item { display: flex; align-items: center; padding: 9px 16px; cursor: pointer; border-left: 3px solid transparent; gap: 7px; transition: background 0.12s; }
  .tpl-item:hover { background: var(--bg); }
  .tpl-item.active { border-left-color: var(--green-light); background: #eef0e6; }
  .tpl-item .ci-name { font-size: 0.88rem; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tpl-item .ci-count { font-size: 0.68rem; color: #888; }

  .new-list-form { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 7px; }
  .new-list-form input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 4px; font-size: 0.83rem; outline: none; }
  .new-list-form input:focus { border-color: var(--green-dark); }
  .btn-add-list { background: var(--green-dark); color: var(--white); border: none; border-radius: 4px; padding: 7px 12px; cursor: pointer; font-size: 1rem; font-weight: 700; }
  .btn-add-list:hover { background: #4f5535; }

  .main { padding: 26px 34px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 0.95rem; text-align: center; padding: 60px; line-height: 1.7; }

  .checklist-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .checklist-name-edit { font-size: 1.45rem; font-weight: 700; color: var(--green-dark); border: none; background: transparent; outline: none; width: 360px; max-width: 100%; }
  .checklist-name-edit:focus { border-bottom: 2px solid var(--green-light); }
  .checklist-meta { font-size: 0.73rem; color: #999; margin-top: 3px; }
  .progress-bar-wrap { background: var(--border); border-radius: 6px; height: 6px; overflow: hidden; width: 130px; }
  .progress-bar-fill { height: 100%; background: var(--green-dark); transition: width 0.3s; border-radius: 6px; }

  .items-list { display: flex; flex-direction: column; gap: 5px; }
  .item-row { display: flex; align-items: center; gap: 9px; background: var(--white); border: 1.5px solid var(--border); border-radius: 6px; padding: 9px 12px; transition: border-color 0.12s; user-select: none; }
  .item-row:hover { border-color: var(--green-light); }
  .item-row.done { background: #f0f2e9; }
  .item-row.dragging { opacity: 0.35; border-style: dashed; }
  .item-row.drag-over { border-color: var(--green-dark); background: #eef0e6; }
  .drag-handle { cursor: grab; color: #ccc; font-size: 1rem; flex-shrink: 0; padding: 0 2px; }
  .drag-handle:hover { color: var(--green-dark); }
  .item-row input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--green-dark); cursor: pointer; flex-shrink: 0; }
  .item-text { flex: 1; font-size: 0.93rem; border: none; background: transparent; outline: none; color: var(--black); min-width: 60px; }
  .item-row.done .item-text { text-decoration: line-through; color: #aaa; }
  .item-note { font-size: 0.78rem; color: #999; border: none; background: transparent; outline: none; width: 150px; min-width: 60px; }
  .btn-del-item { background: none; border: none; cursor: pointer; color: #ccc; font-size: 1rem; padding: 0 1px; flex-shrink: 0; }
  .btn-del-item:hover { color: #c00; }

  .tpl-item-row { display: flex; align-items: center; gap: 9px; background: var(--white); border: 1.5px solid var(--border); border-radius: 6px; padding: 9px 12px; user-select: none; }
  .tpl-item-row.dragging { opacity: 0.35; border-style: dashed; }
  .tpl-item-row.drag-over { border-color: var(--green-dark); background: #eef0e6; }
  .tpl-item-row .drag-handle { cursor: grab; color: #ccc; }
  .tpl-item-row .drag-handle:hover { color: var(--green-dark); }
  .tpl-item-text { flex: 1; font-size: 0.93rem; border: none; background: transparent; outline: none; }
  .tpl-item-note { font-size: 0.78rem; color: #999; border: none; background: transparent; outline: none; width: 150px; }

  .add-item-form { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .add-item-form input[type="text"] { flex: 1; min-width: 120px; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.88rem; outline: none; }
  .add-item-form input:focus { border-color: var(--green-dark); }
  .btn-add-item { background: var(--green-light); color: var(--green-dark); border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.88rem; font-weight: 700; white-space: nowrap; }
  .btn-add-item:hover { background: #a8b082; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-action { display: flex; align-items: center; gap: 5px; padding: 7px 15px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--green-dark); background: transparent; color: var(--green-dark); transition: background 0.12s; white-space: nowrap; }
  .btn-action:hover { background: #eef0e6; }
  .btn-action.primary { background: var(--green-dark); color: var(--white); }
  .btn-action.primary:hover { background: #4f5535; }
  .btn-action.accent { background: var(--green-light); color: var(--green-dark); border-color: var(--green-light); }
  .btn-action.accent:hover { background: #a8b082; }
  .btn-action.danger { border-color: #c00; color: #c00; }
  .btn-action.danger:hover { background: #fff0f0; }

  .tpl-badge { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 8px; vertical-align: middle; }
  .tpl-meta { font-size: 0.73rem; color: #999; margin-top: 3px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--white); border-radius: 10px; padding: 28px 32px; min-width: 320px; max-width: 420px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 1.1rem; color: var(--green-dark); margin-bottom: 16px; }
  .modal p { font-size: 0.88rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
  .modal-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.9rem; outline: none; margin-bottom: 18px; }
  .modal-input:focus { border-color: var(--green-dark); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--green-light); transition: width 0.3s; z-index: 200; pointer-events: none; }

  @media print {
    body { background: white; }
    header { display: block; padding: 8px 0; border-bottom: 2px solid #000; margin-bottom: 14px; }
    .sync-status, .header-right { display: none !important; }
    .sidebar, .new-list-form, .add-item-form, .actions, .btn-del-item, .ci-del, .sidebar-tabs, .drag-handle, .modal-overlay, .loading-bar { display: none !important; }
    .app { grid-template-columns: 1fr; }
    .main { padding: 0; }
    .checklist-name-edit { font-size: 1.3rem; pointer-events: none; }
    .item-row { border: 1px solid #ccc; page-break-inside: avoid; }
    .item-text, .item-note { pointer-events: none; }
    .print-timestamp { display: block !important; font-size: 0.78rem; color: #666; margin-bottom: 14px; }
    .no-print { display: none !important; }
  }
  .print-timestamp { display: none; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0%"></div>

<header>
  <h1>Checklists</h1>
  <div class="header-right">
    <span class="sync-status" id="syncStatus">Connectant…</span>
    <span style="font-size:0.72rem;opacity:0.45;" id="headerDate"></span>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" id="tabLists" onclick="switchTab('lists')">Llistes</button>
      <button class="tab-btn" id="tabTemplates" onclick="switchTab('templates')">Plantilles</button>
    </div>
    <div class="sidebar-section" id="sectionLists">
      <div class="list-scroll" id="checklistList"></div>
      <div class="new-list-form">
        <input type="text" id="newListName" placeholder="Nova llista…" maxlength="60">
        <button class="btn-add-list" onclick="addChecklist()" title="Afegir">+</button>
      </div>
    </div>
    <div class="sidebar-section hidden" id="sectionTemplates">
      <div class="list-scroll" id="templateList"></div>
      <div class="new-list-form">
        <input type="text" id="newTplName" placeholder="Nova plantilla…" maxlength="60">
        <button class="btn-add-list" onclick="addTemplate()" title="Afegir">+</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="empty-state" id="emptyState">Selecciona una llista o plantilla,<br>o crea'n una de nova.</div>

    <div id="checklistEditor" style="display:none;flex-direction:column;gap:16px;">
      <div class="print-timestamp" id="printTimestamp"></div>
      <div class="checklist-header">
        <div>
          <input class="checklist-name-edit" type="text" id="editName" placeholder="Nom de la llista…" oninput="renameActive(this.value)">
          <div class="checklist-meta" id="checklistMeta"></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
          <span style="font-size:0.8rem;color:#888;" id="progressLabel">0 / 0</span>
        </div>
      </div>
      <div class="items-list" id="itemsList"></div>
      <div class="add-item-form no-print">
        <input type="text" id="newItemText" placeholder="Afegir un ítem…" maxlength="200" onkeydown="if(event.key==='Enter') addItem()">
        <input type="text" id="newItemNote" placeholder="Nota (opcional)" maxlength="100"
               style="width:170px;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-size:0.85rem;outline:none;"
               onkeydown="if(event.key==='Enter') addItem()">
        <button class="btn-add-item" onclick="addItem()">Afegir ítem</button>
      </div>
      <div class="actions no-print">
        <button class="btn-action" onclick="uncheckAll()">Desmarcar tot</button>
        <button class="btn-action" onclick="checkAll()">Marcar tot</button>
        <button class="btn-action accent" onclick="openSaveAsTemplate()">Desar com a plantilla</button>
        <button class="btn-action primary" onclick="printChecklist()">Imprimir amb timestamp</button>
        <button class="btn-action danger" onclick="deleteActive()">Eliminar</button>
      </div>
    </div>

    <div id="templateEditor" style="display:none;flex-direction:column;gap:16px;">
      <div class="checklist-header">
        <div>
          <input class="checklist-name-edit" type="text" id="tplEditName" placeholder="Nom de la plantilla…" oninput="renameTpl(this.value)">
          <span class="tpl-badge">Plantilla</span>
          <div class="tpl-meta" id="tplMeta"></div>
        </div>
      </div>
      <div class="items-list" id="tplItemsList"></div>
      <div class="add-item-form no-print">
        <input type="text" id="newTplItemText" placeholder="Afegir un ítem…" maxlength="200" onkeydown="if(event.key==='Enter') addTplItem()">
        <input type="text" id="newTplItemNote" placeholder="Nota (opcional)" maxlength="100"
               style="width:170px;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-size:0.85rem;outline:none;"
               onkeydown="if(event.key==='Enter') addTplItem()">
        <button class="btn-add-item" onclick="addTplItem()">Afegir ítem</button>
      </div>
      <div class="actions no-print">
        <button class="btn-action accent" onclick="openCreateFromTpl()">Crear llista des d'aquesta plantilla</button>
        <button class="btn-action danger" onclick="deleteTpl()">Eliminar plantilla</button>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="modalSaveAsTpl">
  <div class="modal">
    <h2>Desar com a plantilla</h2>
    <p>Tots els ítems es copiaran (sense marcar) a la nova plantilla.</p>
    <input class="modal-input" type="text" id="tplNameInput" placeholder="Nom de la plantilla…" maxlength="60" onkeydown="if(event.key==='Enter') saveAsTemplate()">
    <div class="modal-actions">
      <button class="btn-action" onclick="closeModal('modalSaveAsTpl')">Cancel·lar</button>
      <button class="btn-action primary" onclick="saveAsTemplate()">Desar plantilla</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modalCreateFromTpl">
  <div class="modal">
    <h2>Crear llista des de plantilla</h2>
    <p>Tots els ítems es copiaran desmarcats a la nova llista.</p>
    <input class="modal-input" type="text" id="fromTplNameInput" placeholder="Nom de la nova llista…" maxlength="60" onkeydown="if(event.key==='Enter') createFromTpl()">
    <div class="modal-actions">
      <button class="btn-action" onclick="closeModal('modalCreateFromTpl')">Cancel·lar</button>
      <button class="btn-action accent" onclick="createFromTpl()">Crear llista</button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ──
const SB_URL = 'https://kbdiwlrkgeablkxkgyoo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiZGl3bHJrZ2VhYmxreGtneW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzU5NDIsImV4cCI6MjA5Njg1MTk0Mn0.Z4pMNdIsuTmps9WjUQKdbslgcjTyFRDIPFBPf5AHz60';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

// ── STATE ──
let state = { lists: [], templates: [], activeId: null, activeTplId: null, activeTab: 'lists' };
let saveTimer = null;

// ── UTILS ──
function genId() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setSync(msg, cls) { const el = document.getElementById('syncStatus'); el.textContent = msg; el.className = 'sync-status ' + (cls||''); }
function setLoading(pct) {
  document.getElementById('loadingBar').style.width = pct + '%';
  if (pct >= 100) setTimeout(() => document.getElementById('loadingBar').style.width = '0%', 500);
}

// ── SUPABASE API ──
async function sbSelect() {
  const r = await fetch(`${SB_URL}/rest/v1/checklists?select=*&order=created_at.asc`, { headers: HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(row) {
  const r = await fetch(`${SB_URL}/rest/v1/checklists`, { method: 'POST', headers: { ...HEADERS, 'Prefer': 'return=representation' }, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
  const data = await r.json();
  return data[0];
}
async function sbUpdate(id, row) {
  const r = await fetch(`${SB_URL}/rest/v1/checklists?id=eq.${id}`, { method: 'PATCH', headers: { ...HEADERS, 'Prefer': 'return=representation' }, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/checklists?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
  if (!r.ok) throw new Error(await r.text());
}

// ── LOAD ──
async function loadAll() {
  setSync('Connectant…', '');
  setLoading(20);
  try {
    const rows = await sbSelect();
    setLoading(80);
    state.lists = [];
    state.templates = [];
    for (const row of rows) {
      const obj = { _dbId: row.id, id: row.id, name: row.name, createdAt: row.created_at, items: row.items || [] };
      if (row.type === 'template') state.templates.push(obj);
      else state.lists.push(obj);
    }
    setLoading(100);
    setSync('Connectat ✓', 'ok');
  } catch(e) {
    setLoading(100);
    setSync('Error de connexió', 'err');
    console.error(e);
  }
  renderSidebar();
  if (state.activeId && state.lists.find(l=>l.id===state.activeId)) renderEditor();
  else if (state.activeTplId && state.templates.find(t=>t.id===state.activeTplId)) renderTplEditor();
  else showEmpty();
}

// ── SAVE ──
async function saveList(list) {
  setSync('Desant…', 'saving');
  try {
    if (list._dbId) {
      await sbUpdate(list._dbId, { name: list.name, items: list.items, type: 'list' });
    } else {
      const row = await sbInsert({ id: list.id, name: list.name, items: list.items, type: 'list' });
      list._dbId = row.id;
    }
    setSync('Desat ✓', 'ok');
  } catch(e) { setSync('Error desant', 'err'); console.error(e); }
}
async function saveTpl(tpl) {
  setSync('Desant…', 'saving');
  try {
    if (tpl._dbId) {
      await sbUpdate(tpl._dbId, { name: tpl.name, items: tpl.items, type: 'template' });
    } else {
      const row = await sbInsert({ id: tpl.id, name: tpl.name, items: tpl.items, type: 'template' });
      tpl._dbId = row.id;
    }
    setSync('Desat ✓', 'ok');
  } catch(e) { setSync('Error desant', 'err'); console.error(e); }
}
function scheduleSave(item, isTpl) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => isTpl ? saveTpl(item) : saveList(item), 700);
}

// ── INIT ──
document.getElementById('headerDate').textContent = new Date().toLocaleString('ca');
document.getElementById('newListName').addEventListener('keydown', e => { if(e.key==='Enter') addChecklist(); });
document.getElementById('newTplName').addEventListener('keydown', e => { if(e.key==='Enter') addTemplate(); });
switchTab('lists', true);
loadAll();

// Recarregar cada 30s si hi ha altres usuaris
setInterval(() => { if (!document.hidden) { const ai = state.activeId, at = state.activeTplId, tab = state.activeTab; loadAll().then(() => { state.activeId = ai; state.activeTplId = at; state.activeTab = tab; if(tab==='lists'&&ai) renderEditor(); else if(tab==='templates'&&at) renderTplEditor(); }); } }, 30000);

// ── TAB ──
function switchTab(tab, init) {
  state.activeTab = tab;
  document.getElementById('tabLists').classList.toggle('active', tab==='lists');
  document.getElementById('tabTemplates').classList.toggle('active', tab==='templates');
  document.getElementById('sectionLists').classList.toggle('hidden', tab!=='lists');
  document.getElementById('sectionTemplates').classList.toggle('hidden', tab!=='templates');
  renderSidebar();
  if (!init) { if(tab==='lists'){ if(state.activeId) renderEditor(); else showEmpty(); } else { if(state.activeTplId) renderTplEditor(); else showEmpty(); } }
}

// ── SIDEBAR ──
function renderSidebar() {
  const cl = document.getElementById('checklistList');
  cl.innerHTML = '';
  if (!state.lists.length) { cl.innerHTML = '<div class="sidebar-empty">Cap llista encara.</div>'; }
  else state.lists.forEach(list => {
    const done = list.items.filter(i=>i.done).length, total = list.items.length;
    const el = document.createElement('div');
    el.className = 'checklist-item' + (list.id===state.activeId?' active':'');
    el.innerHTML = `<span class="ci-icon">☑</span><span class="ci-name" title="${esc(list.name)}">${esc(list.name)}</span><span class="ci-prog">${done}/${total}</span><button class="ci-del" onclick="event.stopPropagation();deleteList('${list.id}')">×</button>`;
    el.addEventListener('click', () => openChecklist(list.id));
    cl.appendChild(el);
  });

  const tl = document.getElementById('templateList');
  tl.innerHTML = '';
  if (!state.templates.length) { tl.innerHTML = '<div class="sidebar-empty">Cap plantilla encara.</div>'; }
  else state.templates.forEach(tpl => {
    const el = document.createElement('div');
    el.className = 'tpl-item' + (tpl.id===state.activeTplId?' active':'');
    el.innerHTML = `<span class="ci-icon">⊞</span><span class="ci-name" title="${esc(tpl.name)}">${esc(tpl.name)}</span><span class="ci-count">${tpl.items.length} ítems</span><button class="ci-del" onclick="event.stopPropagation();deleteTemplate('${tpl.id}')">×</button>`;
    el.addEventListener('click', () => openTemplate(tpl.id));
    tl.appendChild(el);
  });
}

// ── CHECKLIST OPS ──
async function addChecklist(name, items) {
  const input = document.getElementById('newListName');
  const n = name || input.value.trim();
  if (!n) return;
  const list = { id: genId(), name: n, createdAt: new Date().toISOString(), items: items || [] };
  state.lists.push(list);
  if (!name) input.value = '';
  renderSidebar(); openChecklist(list.id);
  await saveList(list);
}
async function deleteList(id) {
  if (!confirm('Eliminar aquesta llista?')) return;
  const list = state.lists.find(l=>l.id===id);
  state.lists = state.lists.filter(l=>l.id!==id);
  if (state.activeId===id) state.activeId = state.lists.length ? state.lists[state.lists.length-1].id : null;
  renderSidebar();
  if (state.activeId) renderEditor(); else showEmpty();
  if (list?._dbId) { try { await sbDelete(list._dbId); } catch(e) { setSync('Error eliminant', 'err'); } }
}
function deleteActive() { if (state.activeId) deleteList(state.activeId); }
function openChecklist(id) { state.activeId = id; state.activeTplId = null; renderSidebar(); renderEditor(); }
function showEmpty() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('checklistEditor').style.display = 'none';
  document.getElementById('templateEditor').style.display = 'none';
}

// ── CHECKLIST EDITOR ──
function renderEditor() {
  const list = state.lists.find(l=>l.id===state.activeId);
  if (!list) { showEmpty(); return; }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('checklistEditor').style.display = 'flex';
  document.getElementById('templateEditor').style.display = 'none';
  document.getElementById('editName').value = list.name;
  const created = new Date(list.createdAt);
  document.getElementById('checklistMeta').textContent = `Creada ${created.toLocaleDateString('ca')} · ${list.items.length} ítem${list.items.length!==1?'s':''}`;
  const done = list.items.filter(i=>i.done).length, total = list.items.length;
  document.getElementById('progressFill').style.width = (total ? Math.round(done/total*100) : 0) + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  renderItemsList(list.items, 'itemsList', false);
}

// ── TEMPLATE EDITOR ──
function renderTplEditor() {
  const tpl = state.templates.find(t=>t.id===state.activeTplId);
  if (!tpl) { showEmpty(); return; }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('checklistEditor').style.display = 'none';
  document.getElementById('templateEditor').style.display = 'flex';
  document.getElementById('tplEditName').value = tpl.name;
  document.getElementById('tplMeta').textContent = `Creada ${new Date(tpl.createdAt).toLocaleDateString('ca')} · ${tpl.items.length} ítem${tpl.items.length!==1?'s':''}`;
  renderItemsList(tpl.items, 'tplItemsList', true);
}

// ── RENDER ITEMS ──
let dragSrcIdx = null;
function renderItemsList(items, containerId, isTemplate) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = isTemplate ? 'tpl-item-row' : ('item-row' + (item.done?' done':''));
    row.draggable = true;
    row.dataset.idx = idx;
    row.innerHTML = isTemplate
      ? `<span class="drag-handle">⠿</span><input class="tpl-item-text" type="text" value="${esc(item.text)}" oninput="updateTplItemText(${idx},this.value)" placeholder="Ítem…"><input class="tpl-item-note" type="text" value="${esc(item.note||'')}" oninput="updateTplItemNote(${idx},this.value)" placeholder="Nota…"><button class="btn-del-item no-print" onclick="deleteTplItem(${idx})">×</button>`
      : `<span class="drag-handle">⠿</span><input type="checkbox" ${item.done?'checked':''} onchange="toggleItem(${idx},this.checked)"><input class="item-text" type="text" value="${esc(item.text)}" oninput="updateItemText(${idx},this.value)" placeholder="Ítem…"><input class="item-note" type="text" value="${esc(item.note||'')}" oninput="updateItemNote(${idx},this.value)" placeholder="Nota…"><button class="btn-del-item no-print" onclick="deleteItem(${idx})">×</button>`;
    // drag events
    row.addEventListener('dragstart', e => { dragSrcIdx = idx; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragend', () => { row.classList.remove('dragging'); container.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over')); dragSrcIdx=null; });
    row.addEventListener('dragover', e => { e.preventDefault(); container.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over')); row.classList.add('drag-over'); });
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      if (dragSrcIdx===null||dragSrcIdx===idx) return;
      if (isTemplate) { const t=activeTpl(); const [m]=t.items.splice(dragSrcIdx,1); t.items.splice(idx,0,m); renderTplEditor(); scheduleSave(t,true); }
      else { const l=activeList(); const [m]=l.items.splice(dragSrcIdx,1); l.items.splice(idx,0,m); renderEditor(); scheduleSave(l,false); }
    });
    row.querySelectorAll('input').forEach(inp => { inp.addEventListener('mousedown',()=>row.draggable=false); inp.addEventListener('blur',()=>row.draggable=true); });
    container.appendChild(row);
  });
}

// ── ITEM OPS ──
function activeList() { return state.lists.find(l=>l.id===state.activeId); }
function activeTpl() { return state.templates.find(t=>t.id===state.activeTplId); }

function addItem() {
  const text = document.getElementById('newItemText').value.trim(); if (!text) return;
  const note = document.getElementById('newItemNote').value.trim();
  const l = activeList(); l.items.push({ id: genId(), text, note, done: false });
  document.getElementById('newItemText').value = ''; document.getElementById('newItemNote').value = '';
  renderEditor(); renderSidebar(); saveList(l); document.getElementById('newItemText').focus();
}
function toggleItem(idx, done) { const l=activeList(); l.items[idx].done=done; renderEditor(); renderSidebar(); scheduleSave(l,false); }
function updateItemText(idx, val) { const l=activeList(); l.items[idx].text=val; renderSidebar(); scheduleSave(l,false); }
function updateItemNote(idx, val) { const l=activeList(); l.items[idx].note=val; scheduleSave(l,false); }
function deleteItem(idx) { const l=activeList(); l.items.splice(idx,1); renderEditor(); renderSidebar(); saveList(l); }
function checkAll() { const l=activeList(); l.items.forEach(i=>i.done=true); renderEditor(); renderSidebar(); saveList(l); }
function uncheckAll() { const l=activeList(); l.items.forEach(i=>i.done=false); renderEditor(); renderSidebar(); saveList(l); }
function renameActive(name) { const l=activeList(); l.name=name; renderSidebar(); scheduleSave(l,false); }

// ── TEMPLATE OPS ──
async function addTemplate(name) {
  const input = document.getElementById('newTplName');
  const n = name || input.value.trim(); if (!n) return;
  const tpl = { id: genId(), name: n, createdAt: new Date().toISOString(), items: [] };
  state.templates.push(tpl); if (!name) input.value = '';
  renderSidebar(); switchTab('templates'); openTemplate(tpl.id);
  await saveTpl(tpl);
}
async function deleteTemplate(id) {
  if (!confirm('Eliminar aquesta plantilla?')) return;
  const tpl = state.templates.find(t=>t.id===id);
  state.templates = state.templates.filter(t=>t.id!==id);
  if (state.activeTplId===id) state.activeTplId = state.templates.length ? state.templates[state.templates.length-1].id : null;
  renderSidebar(); if (state.activeTplId) renderTplEditor(); else showEmpty();
  if (tpl?._dbId) { try { await sbDelete(tpl._dbId); } catch(e) { setSync('Error eliminant','err'); } }
}
function deleteTpl() { if (state.activeTplId) deleteTemplate(state.activeTplId); }
function openTemplate(id) { state.activeTplId = id; state.activeId = null; renderSidebar(); renderTplEditor(); }
function renameTpl(name) { const t=activeTpl(); t.name=name; renderSidebar(); scheduleSave(t,true); }
function addTplItem() {
  const text = document.getElementById('newTplItemText').value.trim(); if (!text) return;
  const note = document.getElementById('newTplItemNote').value.trim();
  const t = activeTpl(); t.items.push({ id: genId(), text, note });
  document.getElementById('newTplItemText').value = ''; document.getElementById('newTplItemNote').value = '';
  renderTplEditor(); renderSidebar(); saveTpl(t); document.getElementById('newTplItemText').focus();
}
function updateTplItemText(idx, val) { const t=activeTpl(); t.items[idx].text=val; renderSidebar(); scheduleSave(t,true); }
function updateTplItemNote(idx, val) { const t=activeTpl(); t.items[idx].note=val; scheduleSave(t,true); }
function deleteTplItem(idx) { const t=activeTpl(); t.items.splice(idx,1); renderTplEditor(); renderSidebar(); saveTpl(t); }

// ── SAVE AS TEMPLATE ──
function openSaveAsTemplate() { document.getElementById('tplNameInput').value = activeList().name; document.getElementById('modalSaveAsTpl').classList.remove('hidden'); setTimeout(()=>document.getElementById('tplNameInput').select(),50); }
async function saveAsTemplate() {
  const name = document.getElementById('tplNameInput').value.trim(); if (!name) { document.getElementById('tplNameInput').focus(); return; }
  const list = activeList();
  const tpl = { id: genId(), name, createdAt: new Date().toISOString(), items: list.items.map(i=>({id:genId(),text:i.text,note:i.note||''})) };
  state.templates.push(tpl); closeModal('modalSaveAsTpl'); renderSidebar();
  await saveTpl(tpl);
  alert(`Plantilla "${name}" desada a la pestanya Plantilles.`);
}

// ── CREATE FROM TEMPLATE ──
function openCreateFromTpl() { document.getElementById('fromTplNameInput').value = activeTpl().name; document.getElementById('modalCreateFromTpl').classList.remove('hidden'); setTimeout(()=>document.getElementById('fromTplNameInput').select(),50); }
function createFromTpl() {
  const name = document.getElementById('fromTplNameInput').value.trim(); if (!name) { document.getElementById('fromTplNameInput').focus(); return; }
  const tpl = activeTpl();
  closeModal('modalCreateFromTpl');
  addChecklist(name, tpl.items.map(i=>({id:genId(),text:i.text,note:i.note||'',done:false})));
}

// ── MODALS ──
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.add('hidden'); }));
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(o=>o.classList.add('hidden')); });

// ── PRINT ──
function printChecklist() {
  const ts = new Date().toLocaleString('ca', {weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('printTimestamp').textContent = 'Imprès el ' + ts;
  window.print();
}
</script>
